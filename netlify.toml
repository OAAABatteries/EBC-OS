[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
# SAMEORIGIN (not DENY) because the admin "preview mode" feature iframes
# the app into itself at /?preview=<role>&device=<id>&... so auditors can
# walk the foreman/employee/driver portals at fixed phone/tablet viewports.
# SAMEORIGIN still blocks cross-origin clickjacking — external sites cannot
# iframe us — it only permits our own domain to frame itself.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://api.openweathermap.org; frame-src 'self'; worker-src 'self' blob:; manifest-src 'self'"

# Cache immutable Vite assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
