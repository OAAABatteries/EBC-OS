<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-48.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06080c" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EBC-OS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="description" content="Construction management OS for drywall & framing contractors" />
    <title>EBC-OS · Eagles Brothers Constructors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Splash screen — visible until React mounts -->
      <div id="splash" style="
        position:fixed;inset:0;z-index:99999;
        background:#06080c;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-family:'Barlow Condensed',sans-serif;color:#e09422;
        transition:opacity .4s;
      ">
        <div style="position:relative;width:80px;height:80px;margin-bottom:24px;">
          <div style="
            width:80px;height:80px;border-radius:50%;
            border:3px solid rgba(224,148,34,0.15);
            border-top-color:#e09422;
            animation:splash-spin 1s linear infinite;
          "></div>
          <div style="
            position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
            font-weight:700;font-size:22px;letter-spacing:1px;
          ">EBC</div>
        </div>
        <div style="font-size:24px;font-weight:700;letter-spacing:3px;">EBC-OS</div>
        <div style="font-size:12px;color:#555;margin-top:6px;letter-spacing:1px;">EAGLES BROTHERS CONSTRUCTORS</div>
        <div style="margin-top:24px;width:120px;height:3px;background:rgba(224,148,34,0.15);border-radius:2px;overflow:hidden;">
          <div style="height:100%;background:#e09422;border-radius:2px;animation:splash-bar 1.8s ease-in-out infinite;"></div>
        </div>
      </div>
      <style>
        @keyframes splash-spin{to{transform:rotate(360deg)}}
        @keyframes splash-bar{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
