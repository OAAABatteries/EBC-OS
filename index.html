<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Dark browser → white eagle on dark circle -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=7" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=7" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=7" media="(prefers-color-scheme: dark)" />
    <!-- Light browser → blue eagle on light circle -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-light-48.png?v=7" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-light-32.png?v=7" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-light-16.png?v=7" media="(prefers-color-scheme: light)" />
    <!-- Fallback (no preference) → dark variant -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=7" />
    <link rel="manifest" href="/manifest.json?v=7" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eagles Brothers Constructors" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=7" />
    <meta name="description" content="Construction management OS for drywall & framing contractors" />
    <title>Eagles Brothers Constructors</title>
    <!-- IBM Plex Mono for data/mono; body/head use platform-native SF Pro (Apple) / Roboto (Android) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Splash screen — visible until React mounts -->
      <div id="splash" style="
        position:fixed;inset:0;z-index:99999;
        background:linear-gradient(160deg,#0a1628 0%,#132244 50%,#0a1628 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,Roboto,sans-serif;color:#ffffff;
        transition:opacity .6s ease-out;
      ">
        <!-- Eagle logo — fade in with subtle glow -->
        <div class="splash-logo">
          <img src="/ebc-eagle-white.png" alt="EBC" style="
            width:96px;height:96px;object-fit:contain;
            opacity:0;animation:splash-reveal 1.4s cubic-bezier(.16,1,.3,1) 0.15s forwards;
            filter:drop-shadow(0 0 30px rgba(255,255,255,0.15));
          " />
        </div>
        <div style="font-size:14px;font-weight:700;letter-spacing:4px;color:#ffffff;margin-top:20px;opacity:0;animation:splash-reveal 1s cubic-bezier(.16,1,.3,1) 0.5s forwards;">
          EAGLES BROTHERS CONSTRUCTORS
        </div>
        <div style="font-size:10px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-top:6px;opacity:0;animation:splash-reveal 0.8s ease-out 0.7s forwards;">
          DRYWALL &amp; FRAMING
        </div>
        <!-- Amber progress bar -->
        <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(245,158,11,0.1);overflow:hidden;opacity:0;animation:splash-reveal 0.6s ease-out 0.8s forwards;">
          <div style="height:100%;background:linear-gradient(90deg,transparent,#f59e0b,transparent);border-radius:2px;animation:splash-bar 1.8s ease-in-out infinite;"></div>
        </div>
      </div>
      <style>
        .splash-logo{
          position:relative;
          width:120px;height:120px;
          display:flex;align-items:center;justify-content:center;
        }
        .splash-logo::before{
          content:'';position:absolute;inset:-12px;
          border-radius:50%;
          background:radial-gradient(circle,rgba(245,158,11,0.06) 0%,transparent 70%);
          animation:splash-glow 2.4s ease-in-out infinite;
        }
        .splash-logo::after{
          content:'';position:absolute;inset:-24px;
          border-radius:50%;
          background:radial-gradient(circle,rgba(255,255,255,0.03) 0%,transparent 60%);
          animation:splash-glow 3s ease-in-out 0.5s infinite;
        }
        @keyframes splash-reveal{
          from{opacity:0;transform:translateY(12px)}
          to{opacity:1;transform:translateY(0)}
        }
        @keyframes splash-glow{
          0%,100%{opacity:0.3;transform:scale(1)}
          50%{opacity:1;transform:scale(1.2)}
        }
        @keyframes splash-bar{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
      </style>
    </div>
    <script>window.__splashStart=Date.now();</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
